# Build and push Docker images to GHCR (repo_servicename, Buildx).
# Runs on push to main and on version tags (v*).
name: Docker CI

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    name: Build and push images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image prefix (lowercase for OCI)
        id: image-prefix
        run: |
          echo "prefix=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (tags)
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag1=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag1=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
          echo "tag2=latest" >> "$GITHUB_OUTPUT"

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: api
          file: api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.prefix }}_api:${{ steps.meta.outputs.tag1 }}
            ${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.prefix }}_api:${{ steps.meta.outputs.tag2 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.prefix }}_frontend:${{ steps.meta.outputs.tag1 }}
            ${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.prefix }}_frontend:${{ steps.meta.outputs.tag2 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ETL
        uses: docker/build-push-action@v6
        with:
          context: etl
          file: etl/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.prefix }}_etl:${{ steps.meta.outputs.tag1 }}
            ${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.prefix }}_etl:${{ steps.meta.outputs.tag2 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
