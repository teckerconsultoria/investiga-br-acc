name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer tag (ex: v0.3.0 or v0.3.1-rc.1)"
        required: true
        type: string
      target_sha:
        description: "Commit SHA on main"
        required: true
        type: string
      prerelease:
        description: "Publish as pre-release"
        required: true
        type: boolean
      title_pt:
        description: "Release title (PT-BR)"
        required: true
        type: string
      title_en:
        description: "Release title (EN)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate inputs and target commit
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ inputs.version }}"
          TARGET_SHA="${{ inputs.target_sha }}"
          SEMVER_RE='^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$'

          if ! [[ "$VERSION" =~ $SEMVER_RE ]]; then
            echo "Invalid version format: $VERSION"
            echo "Use vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-rc.N"
            exit 1
          fi

          git fetch origin main --tags

          if git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null; then
            echo "Tag already exists: $VERSION"
            exit 1
          fi

          if ! git cat-file -e "${TARGET_SHA}^{commit}" 2>/dev/null; then
            echo "Invalid commit SHA: $TARGET_SHA"
            exit 1
          fi

          if ! git merge-base --is-ancestor "$TARGET_SHA" "origin/main"; then
            echo "Target SHA is not reachable from origin/main"
            exit 1
          fi

          PREVIOUS_TAG="$(git tag --list 'v*' --sort=-v:refname | grep -v "^${VERSION}$" | head -n1 || true)"
          if [ -n "$PREVIOUS_TAG" ]; then
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${VERSION}"
          else
            COMPARE_URL=""
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
          echo "compare_url=$COMPARE_URL" >> "$GITHUB_OUTPUT"

      - name: Create annotated tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.validate.outputs.version }}"
          TARGET_SHA="${{ steps.validate.outputs.target_sha }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$VERSION" "$TARGET_SHA" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Build release notes and manifest
        id: manifest
        shell: bash
        env:
          VERSION: ${{ steps.validate.outputs.version }}
          TARGET_SHA: ${{ steps.validate.outputs.target_sha }}
          PREVIOUS_TAG: ${{ steps.validate.outputs.previous_tag }}
          COMPARE_URL: ${{ steps.validate.outputs.compare_url }}
          TITLE_PT: ${{ inputs.title_pt }}
          TITLE_EN: ${{ inputs.title_en }}
        run: |
          set -euo pipefail
          DATE_UTC="$(date -u +"%Y-%m-%d")"
          export DATE_UTC

          cat > release_notes.md <<NOTES
          ## PT-BR

          ${TITLE_PT}

          ### Escopo
          - Release publicada por marco.
          - Mudanças detalhadas por categorias no histórico desta versão.

          ### Integridade pública
          Os sinais e padrões refletem coocorrências em bases públicas e não constituem prova legal.

          ## EN

          ${TITLE_EN}

          ### Scope
          - Milestone-based release publication.
          - Detailed changes grouped by category in this version history.

          ### Public integrity
          Signals and patterns reflect co-occurrence in public records and are not legal proof.

          ## Compatibility

          - Breaking changes: declare explicitly when applicable.
          - Migration required: declare explicitly when applicable.

          ## Compare

          ${COMPARE_URL}

          ## Metadata

          - Version: ${VERSION}
          - Target SHA: ${TARGET_SHA}
          - Previous tag: ${PREVIOUS_TAG}
          - Date (UTC): ${DATE_UTC}
          NOTES

          python - <<'PY'
          import json
          import os

          payload = {
              "version": os.environ["VERSION"],
              "date": os.environ.get("DATE_UTC", ""),
              "highlights_pt": [os.environ["TITLE_PT"]],
              "highlights_en": [os.environ["TITLE_EN"]],
              "api_changes": [],
              "data_changes": [],
              "privacy_compliance_changes": [],
              "breaking_changes": False,
              "migration_required": False,
              "compare_url": os.environ.get("COMPARE_URL", ""),
          }
          with open("release_manifest.json", "w", encoding="utf-8") as fh:
              json.dump(payload, fh, ensure_ascii=False, indent=2)
          PY

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.validate.outputs.version }}"
          TARGET_SHA="${{ steps.validate.outputs.target_sha }}"

          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$VERSION" \
            --verify-tag \
            --target "$TARGET_SHA" \
            --title "$VERSION — ${{ inputs.title_en }}" \
            --notes-file release_notes.md \
            $PRERELEASE_FLAG

          gh release upload "$VERSION" release_manifest.json --clobber
