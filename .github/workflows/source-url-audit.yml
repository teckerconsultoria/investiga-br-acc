name: Source URL Audit

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  source-url-audit:
    name: Source URL Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run source URL audit
        run: |
          python scripts/check_source_urls.py \
            --registry-path docs/source_registry_br_v1.csv \
            --exceptions-path config/source_url_exceptions.yml \
            --output audit-results/source-url-audit/source-url-audit.json

      - name: Upload source URL audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-url-audit
          path: audit-results/source-url-audit/source-url-audit.json
          if-no-files-found: error
